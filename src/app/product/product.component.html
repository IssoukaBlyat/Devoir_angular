<div>
    <app-header></app-header>
    <br />
    <h1>Produits</h1>

    <ul>
        <li *ngFor="let produit of ( produits | filterByName )">
            <img src={{produit.photo}} />
            {{produit.name}}
            {{produit.description}}
            {{produit.prix}}
        </li>
    </ul>
    
    <br />
    <app-footer></app-footer>
</div>
